<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
<title>{{TITLE}}</title>
<style>
body {
	margin: 0;
	padding: 2rem 1rem;
	font-family: "Geist Mono", ui-monospace, "Cascadia Mono", "Segoe UI Mono", "Liberation Mono", Menlo, Monaco, Consolas, monospace;
	font-size: 14px;
	line-height: 1.6;
	color: #6e6e6e;
	background: #fff;
}
.h, th { color: #171717; }
@media (prefers-color-scheme: dark) {
	body { color: #8f8f8f; background: #0a0a0a; }
	.h, th { color: #ededed; }
	a { color: oklch(73.08% .1583 248.133); }
}
.container {
	max-width: 52rem;
	margin: 0 auto;
}
pre {
	margin: 0;
	white-space: pre-wrap;
	word-wrap: break-word;
	font-family: inherit;
}
a { color: oklch(73.08% .1583 248.133); text-decoration: none; }
a:hover { text-decoration: underline; }
table {
	width: calc(100% + 1.5em);
	margin-left: -0.75em;
	border-collapse: collapse;
	table-layout: auto;
}
th, td {
	padding: 0.125em 0.75em;
	text-align: left;
	vertical-align: top;
	font-weight: normal;
}
th:not(:first-child),
td:not(:first-child) {
	white-space: nowrap;
}
tr.blank td {
	padding: 0;
	height: 1lh;
}
tr.sep td {
	padding: 0;
	height: 0;
	line-height: 0;
	position: relative;
}
code {
	font-family: inherit;
}
blockquote {
	margin: 0;
	padding: 0;
	font-family: inherit;
}
.sr {
	position: absolute;
	width: 1px;
	height: 1px;
	padding: 0;
	margin: -1px;
	overflow: hidden;
	clip: rect(0, 0, 0, 0);
	white-space: nowrap;
	border: 0;
}
</style>
</head>
<body>
<div class="container">
{{BODY}}
</div>
</body>
</html>
